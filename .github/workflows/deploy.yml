name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from Actions tab
  workflow_dispatch:

# Sets permissions of GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        if: env.BATCH_MODE == 'true'
        run: |
          sudo apt-get install -y -qq ffmpeg
        env:
          BATCH_MODE: ${{ github.event.inputs.batch_mode == 'true' || 'false' }}

      - name: Convert livestreams to episodes
        env:
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NBUNKSEC: ${{ secrets.NBUNKSEC }}
          LIVESTREAM_AUTHOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          BATCH_MODE: ${{ github.event.inputs.batch_mode || 'false' }}
          LIVESTREAM_IDS: ${{ github.event.inputs.livestream_ids || '' }}
        run: |
          npx -y tsx scripts/convert-livestreams-to-episodes.ts \
            --batch-mode="${BATCH_MODE}" \
            --livestream-ids="${LIVESTREAM_IDS}"

      - name: Build React app
        run: |
          npm run build:gh-pages

      - name: Verify RSS feed
        env:
          PODCAST_CREATOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          RSS_FEED_PATH: dist/rss.xml
        run: npx -y tsx scripts/verify-rss-feed.ts

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
