name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting default branch
  push:
    branches: ["main", "bugfixes", "feat/*"]

  # Schedule automatic deployment Wednesday and Thursday at 1pm Central
  schedule:
    - cron: '0 18 * * 3'  # Wednesday at 1pm Central (6pm UTC)
    - cron: '0 18 * * 4'  # Thursday at 1pm Central (6pm UTC)

  # Allows you to run this workflow manually from Actions tab
  workflow_dispatch:
    inputs:
      retroactive_transcription:
        description: 'Enable retroactive transcription for past episodes'
        required: false
        default: false
        type: boolean
      test_mode:
        description: 'Enable test mode (10-minute transcription timeout)'
        required: false
        default: false
        type: boolean

# Sets permissions of GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow concurrent runs so transcription jobs don't cancel each other
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install WhisperX
        run: |
          pip install git+https://github.com/m-bain/whisperx.git

      - name: Check past episodes for missing transcripts
        run: npx -y tsx scripts/convert-livestreams-to-episodes.ts
        env:
          LIVESTREAM_AUTHOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NBUNKSEC: ${{ secrets.NBUNKSEC }}
          RETROACTIVE_TRANSCRIPTION: ${{ github.event.inputs.retroactive_transcription == 'true' }}
        if: github.event.inputs.retroactive_transcription == 'true'

      - name: Convert livestreams to episodes
        run: npx -y tsx scripts/convert-livestreams-to-episodes.ts
        env:
          LIVESTREAM_AUTHOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NBUNKSEC: ${{ secrets.NBUNKSEC }}

      - name: Transcribe audio with WhisperX
        run: npx -y tsx scripts/transcribe-audio.ts
        timeout-minutes: 360
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          TEST_MODE: 'false'
        if: hashFiles('.episodes-to-transcribe.json') != ''

      - name: Update episodes with transcript URLs and show notes
        run: npx -y tsx scripts/update-episodes-with-transcripts.ts
        env:
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NBUNKSEC: ${{ secrets.NBUNKSEC }}
          RELAY_URL: "wss://nos.lol"
        if: hashFiles('.transcript-mapping.json') != ''

      - name: Generate show notes
        run: npx -y tsx scripts/generate-show-notes.ts
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        if: hashFiles('.transcript-mapping.json') != ''

      - name: Build RSS feed and React app
        run: npm run build

      - name: Commit transcripts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add transcripts/
          git add .transcript-mapping.json || true
          git diff --staged --quiet || git commit -m "chore: add episode transcripts"
          git push
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: hashFiles('transcripts/*') != ''

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
