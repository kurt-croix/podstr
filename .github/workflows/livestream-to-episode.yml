name: Convert Livestreams to Episodes

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      batch_mode:
        description: 'Batch multiple livestreams into one episode'
        required: false
        default: 'false'
        type: boolean
      livestream_ids:
        description: 'Comma-separated livestream d-tag identifiers (optional, for manual selection)'
        required: false
        type: string
  push:

  # Scheduled check (once daily at 2 AM UTC)
  schedule:
    - cron: '0 2 * * *'

jobs:
  convert-livestreams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        if: env.BATCH_MODE == 'true'
        run: |
          sudo apt-get install -y -qq ffmpeg
        env:
          BATCH_MODE: ${{ github.event.inputs.batch_mode == 'true' || 'false' }}

      - name: Convert livestreams to episodes
        env:
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NBUNKSEC: ${{ secrets.NBUNKSEC }}
          LIVESTREAM_AUTHOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          BATCH_MODE: ${{ github.event.inputs.batch_mode || 'false' }}
          LIVESTREAM_IDS: ${{ github.event.inputs.livestream_ids || '' }}
        run: |
          npx -y tsx scripts/convert-livestreams-to-episodes.ts \
            --batch-mode="${BATCH_MODE}" \
            --livestream-ids="${LIVESTREAM_IDS}"

      - name: Generate RSS feed
        run: npx -y tsx scripts/build-rss.ts

      - name: Verify RSS feed
        env:
          PODCAST_CREATOR_NPUB: ${{ secrets.LIVESTREAM_AUTHOR_NPUB }}
          RSS_FEED_PATH: dist/rss.xml
        run: npx -y tsx scripts/verify-rss-feed.ts

      - name: Upload RSS files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rss-files
          path: |
            dist/rss.xml
            dist/rss-health.json
            dist/.nojekyll

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download RSS files
        uses: actions/download-artifact@v4
        with:
          name: rss-files

      - name: Move RSS files to root
        run: |
          mv rss.xml rss-health.json .nojekyll .

      - name: Commit and push RSS updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml rss-health.json .nojekyll
          git diff --staged --quiet || git commit -m "Update RSS feed [skip ci]"
          git push
